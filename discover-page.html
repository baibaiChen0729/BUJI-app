<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>步集 · 发现页</title>
<style>
  @font-face {
    font-family: 'momozhuanji';
    src: url('assets/fonts/momozhuanji.ttf') format('truetype');
    font-weight: 500; font-display: swap;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0a0a0f; font-family: -apple-system, "PingFang SC", sans-serif;
    min-height: 100dvh; overflow: hidden; display: flex; align-items: center; justify-content: center;
    color: #2e383f; user-select: none;
  }
  .phone-shell {
    width: 430px; height: 932px; background: #faf9f9; border-radius: 54px;
    box-shadow: 0 0 0 2px #2a2a30, 0 30px 80px rgba(0,0,0,0.8);
    overflow: hidden; position: relative;
  }
  @media (max-height: 960px) { .phone-shell { transform: scale(0.86); transform-origin: center; } }
  @media (max-height: 820px) { .phone-shell { transform: scale(0.74); transform-origin: center; } }
  @media (max-height: 720px) { .phone-shell { transform: scale(0.64); transform-origin: center; } }

  .blob { position: absolute; border-radius: 50%; filter: blur(2px); }
  .blob-a { left: -40px; top: -178px; width: 276px; height: 251px; background: #DBEBF1; opacity: .8; }
  .blob-b { left: 243px; top: -144px; width: 254px; height: 254px; background: #CEE9F2; opacity: .8; }

  .status-bar { position: absolute; top: 0; left: 0; right: 0; height: 59px; z-index: 30; }
  .status-time { position: absolute; left: 59px; top: 21px; font-size: 17px; font-weight: 600; color: #141414; font-family: -apple-system, sans-serif; }
  .status-icons { position: absolute; right: 28px; top: 24px; display: flex; gap: 6px; align-items: center; }
  .status-icons svg { display: block; }

  .greet-hi { position: absolute; left: 31px; top: 94px; font-family: 'momozhuanji', cursive; font-size: 32px; line-height: 40px; color: #2E383F; z-index: 5; }
  .greet-sub { position: absolute; left: 31px; top: 146px; font-family: 'momozhuanji', cursive; font-size: 32px; line-height: 40px; color: #2E383F; z-index: 5; }

  /* 任务卡台（两张卡循环承载 6 个任务） */
  .deck { position: absolute; left: 35px; top: 253px; width: 360px; height: 419px; z-index: 6; touch-action: none; }
  .task-card {
    position: absolute; left: 0; top: 0; width: 360px; height: 419px;
    border-radius: 20px; overflow: hidden; cursor: grab;
    box-shadow: 0 10px 30px rgba(40,60,80,0.18);
    will-change: transform;
  }
  .task-card.dark { background: #5C748B; }
  .task-card.light { background: #C2D1DF; }

  .stars { position: absolute; left: 96px; top: 29px; height: 36px; }
  .stars i { position: absolute; width: 16px; height: 16px; border-radius: 46% 54% 52% 48% / 50% 48% 52% 50%; display: block; }
  .task-card.dark .stars i { background: #A8BBC5; }
  .task-card.light .stars i { background: #5C748B; }

  .task-title {
    position: absolute; left: 38px; top: 130px; width: 284px;
    font-family: 'momozhuanji', cursive; font-size: 24px; line-height: 33px;
    text-align: center; letter-spacing: 1px;
  }
  .task-card.dark .task-title { color: #FFFFFF; }
  .task-card.light .task-title { color: #2E383F; }

  /* 配图（手绘抠图）接口：data-image；自带 6° 斜度 */
  .task-pic {
    position: absolute; left: 166px; top: 235px; width: 123px; height: 119px;
    transform: rotate(6deg); transform-origin: center;
    background-size: contain; background-repeat: no-repeat; background-position: center;
  }
  .task-pic.placeholder {
    border: 2px dashed rgba(255,255,255,.5); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: rgba(255,255,255,.7); text-align: center; line-height: 1.4; white-space: pre;
  }
  .task-card.light .task-pic.placeholder { border-color: rgba(46,56,63,.35); color: rgba(46,56,63,.55); }

  .pager { position: absolute; left: 0; top: 700px; width: 430px; height: 6px; display: flex; justify-content: center; align-items: center; gap: 5px; z-index: 8; }
  .pager .dot { width: 5px; height: 5px; border-radius: 50%; background: #303034; opacity: .2; transition: all .3s; }
  .pager .dot.active { background: #152938; opacity: 1; width: 6px; height: 6px; }

  .btn-go {
    position: absolute; left: 143px; top: 756px; width: 144px; height: 56px;
    background: #2E383F; border-radius: 80px; border: none; cursor: pointer;
    color: #fff; font-size: 18px; font-weight: 600; font-family: -apple-system, "PingFang SC", sans-serif;
    display: flex; align-items: center; justify-content: center; z-index: 9;
    transition: transform .15s, opacity .15s;
  }
  .btn-go:active { transform: scale(0.96); opacity: .9; }

  /* 第一次记录后：底部浅蓝渐变呼吸灯 +「上滑查看我的步集」 */
  .breath {
    position: absolute; left: 0; right: 0; bottom: 0; height: 160px; z-index: 12;
    pointer-events: none; opacity: 0; transition: opacity .5s; touch-action: none;
    background: linear-gradient(to top, rgba(206,233,242,0.95) 0%, rgba(219,235,241,0.55) 45%, rgba(219,235,241,0) 100%);
    animation: breathe 2.6s ease-in-out infinite;
  }
  .breath.show { opacity: 1; pointer-events: auto; cursor: pointer; }
  @keyframes breathe { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
  .breath-text {
    position: absolute; left: 0; right: 0; bottom: 30px; text-align: center;
    font-size: 14px; color: #2E383F; font-family: -apple-system, "PingFang SC", sans-serif;
    letter-spacing: 1px; font-weight: 500;
  }
  .breath-arrow {
    position: absolute; left: 50%; bottom: 58px; transform: translateX(-50%);
    width: 22px; height: 22px; animation: arrowBobUp 1.6s ease-in-out infinite;
  }
  @keyframes arrowBobUp { 0%,100%{ transform: translateX(-50%) translateY(0);} 50%{ transform: translateX(-50%) translateY(-6px);} }

  .home-ind { position: absolute; left: 50%; bottom: 9px; transform: translateX(-50%); width: 139px; height: 5px; border-radius: 100px; background: #000; z-index: 40; }

  .demo-toggle { position: absolute; right: 14px; top: 64px; z-index: 50; font-size: 11px; background: rgba(0,0,0,.5); color: #fff; border: none; border-radius: 8px; padding: 5px 8px; cursor: pointer; }

  /* embed 模式（被 buji.html 容器以 iframe 嵌入时）：去掉外壳，撑满 iframe */
  body.embed { background: transparent; }
  body.embed .phone-shell { box-shadow: none; border-radius: 0; position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: auto; height: auto; transform: none !important; }
  body.embed .demo-toggle { display: none; }
</style>
</head>
<body>

<div class="phone-shell">
  <div class="blob blob-a"></div>
  <div class="blob blob-b"></div>

  <div class="status-bar">
    <div class="status-time">9:41</div>
    <div class="status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#141414"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#141414"><path d="M8.5 2.2c2.6 0 5 1 6.8 2.7l1.3-1.4A11.4 11.4 0 0 0 8.5.2 11.4 11.4 0 0 0 .4 3.5l1.3 1.4A9.4 9.4 0 0 1 8.5 2.2zm0 3.6c1.6 0 3.1.6 4.2 1.7l1.3-1.4a8 8 0 0 0-11 0l1.3 1.4A6 6 0 0 1 8.5 5.8zm0 3.5c.7 0 1.4.3 1.9.8l-1.9 2-1.9-2c.5-.5 1.2-.8 1.9-.8z"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#141414" stroke-opacity="0.4"/><rect x="2" y="2" width="18" height="9" rx="2" fill="#141414"/><path d="M24.5 4.5v4c1-.4 1-3.6 0-4z" fill="#141414" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="greet-hi">Hi！</div>
  <div class="greet-sub">今天去这里吧～</div>

  <div class="deck" id="deck">
    <div class="task-card dark" id="cardA">
      <div class="stars"></div>
      <div class="task-title"></div>
      <div class="task-pic"></div>
    </div>
    <div class="task-card light" id="cardB">
      <div class="stars"></div>
      <div class="task-title"></div>
      <div class="task-pic"></div>
    </div>
  </div>

  <div class="pager" id="pager"></div>

  <button class="btn-go" id="btnGo">去记录</button>

  <!-- 第一次记录后：呼吸灯 +「上滑查看我的步集」 -->
  <div class="breath" id="breath">
    <svg class="breath-arrow" viewBox="0 0 22 22" fill="none"><path d="M5 14l6-6 6 6" stroke="#2E383F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div class="breath-text">上滑查看我的步集</div>
  </div>

  <div class="home-ind"></div>

  <button class="demo-toggle" id="demoToggle">模拟“已记录”</button>
</div>

<script>
// ── 6 个任务（image 为接口：之后补 6 张抠图手绘图填到对应 image 即可）──
const TASKS = [
  { title: '去楼下便利店\n买一支没买过的饮料', image: '' },
  { title: '给路边的一棵树\n拍一张照片', image: '' },
  { title: '找一个\n好看的井盖', image: '' },
  { title: '记录此刻\n天空的颜色', image: '' },
  { title: '观察一只\n路过的小动物', image: '' },
  { title: '写下现在\n最想说的一句话', image: '' },
];
const N = TASKS.length;
function _param(k) { return new URLSearchParams(location.search).get(k) || new URLSearchParams(location.hash.slice(1)).get(k); }
const EMBED = _param('embed') === '1';
if (EMBED) document.body.classList.add('embed');

const deck = document.getElementById('deck');
const pager = document.getElementById('pager');
let frontEl = document.getElementById('cardA');  // 深色，初始在前
let backEl  = document.getElementById('cardB');  // 浅色，初始在后
let index = 0, animating = false;

const FRONT_T = 'translate(0px,0px) rotate(2deg) scale(1)';
const BACK_T  = 'translate(8px,14px) rotate(-5deg) scale(0.95)';
const EASE    = 'cubic-bezier(.34,.06,.2,1)';

// 页码
for (let i = 0; i < N; i++) { const d = document.createElement('div'); d.className = 'dot' + (i === 0 ? ' active' : ''); pager.appendChild(d); }
function syncPager() { [...pager.children].forEach((d, i) => d.classList.toggle('active', i === index)); }

function fillCard(el, taskIdx) {
  const t = TASKS[((taskIdx % N) + N) % N];
  el.querySelector('.task-title').innerHTML = t.title.replace(/\n/g, '<br>');
  const stars = el.querySelector('.stars');
  if (!stars.dataset.built) {
    for (let i = 0; i < 4; i++) { const s = document.createElement('i'); s.style.left = (i * 62) + 'px'; s.style.top = (i * 7) + 'px'; stars.appendChild(s); }
    stars.dataset.built = '1';
  }
  const pic = el.querySelector('.task-pic');
  if (t.image) { pic.classList.remove('placeholder'); pic.style.backgroundImage = `url('${t.image}')`; pic.textContent = ''; }
  else { pic.classList.add('placeholder'); pic.style.backgroundImage = ''; pic.textContent = '手绘图\n接口'; }
}

function place(el, transform, z) { el.style.transform = transform; el.style.zIndex = z; }
function settle() {                         // 瞬时定位（无过渡）
  frontEl.style.transition = backEl.style.transition = 'none';
  place(frontEl, FRONT_T, 2);
  place(backEl, BACK_T, 1);
}
function render() { fillCard(frontEl, index); fillCard(backEl, index + 1); settle(); syncPager(); }

// ── 连贯切换：front 从「当前所在位置」顺势过渡到 back 位，back 同时升到 front 位 ──
function go(dir) {                           // dir=+1 下一张, -1 上一张
  if (animating) return; animating = true;
  // front 顺势滑到第二张背后（一段连续 transition，从当前拖拽位继续，无中间停顿）
  frontEl.style.transition = `transform .46s ${EASE}`;
  backEl.style.transition  = `transform .46s ${EASE}`;
  place(frontEl, BACK_T, 1);
  place(backEl, FRONT_T, 2);
  const onEnd = (e) => {
    if (e.propertyName !== 'transform') return;
    backEl.removeEventListener('transitionend', onEnd);
    const old = frontEl; frontEl = backEl; backEl = old;   // 交换身份（深浅自动交替）
    index = ((index + dir) % N + N) % N;
    fillCard(backEl, index + 1);                            // 新的“下一张”填入后卡
    settle();                                               // 瞬时落位
    requestAnimationFrame(() => requestAnimationFrame(() => {
      frontEl.style.transition = backEl.style.transition = '';
      animating = false; syncPager();
    }));
  };
  backEl.addEventListener('transitionend', onEnd);
}

// ── 拖拽（跟手 + 松手顺势）──
let dragging = false, sx = 0, dx = 0;
deck.addEventListener('pointerdown', e => {
  if (animating) return;
  dragging = true; sx = e.clientX; dx = 0;
  frontEl.style.transition = 'none';
  deck.setPointerCapture && deck.setPointerCapture(e.pointerId);
});
deck.addEventListener('pointermove', e => {
  if (!dragging) return;
  dx = e.clientX - sx;
  frontEl.style.transform = `translate(${dx}px, ${Math.abs(dx) * 0.12}px) rotate(${2 + dx / 30}deg) scale(1)`;
});
function endDrag() {
  if (!dragging) return; dragging = false;
  if (Math.abs(dx) > 70) {
    go(dx < 0 ? 1 : -1);                     // 从当前拖拽位直接顺势到背后
  } else {
    frontEl.style.transition = `transform .3s ${EASE}`;
    frontEl.style.transform = FRONT_T;       // 回弹
  }
}
deck.addEventListener('pointerup', endDrag);
deck.addEventListener('pointercancel', endDrag);

// 去记录 → 相机
document.getElementById('btnGo').addEventListener('click', () => { location.href = 'live-template-camera.html'; });

// ── 呼吸灯（第一次记录后出现）+ 整页「上滑」回相册地图 ──
const breath = document.getElementById('breath');
function showBreath(on) { breath.classList.toggle('show', on); }
let recorded = _param('recorded') === '1';

// 整个页面上滑（记录后生效）→ 相册地图；要求垂直上滑为主，避免与左右切卡冲突
const shell = document.querySelector('.phone-shell');
let gx = 0, gy = 0, gDown = false;
shell.addEventListener('pointerdown', e => { gx = e.clientX; gy = e.clientY; gDown = true; }, true);
shell.addEventListener('pointerup', e => {
  if (!gDown) return; gDown = false;
  if (!recorded) return;
  const dyUp = gy - e.clientY;                 // 上滑为正
  const dxAbs = Math.abs(e.clientX - gx);
  if (dyUp > 60 && dyUp > dxAbs * 1.2) { if (EMBED) parent.postMessage('goAlbum', '*'); else location.href = 'album-map.html'; }
}, true);
breath.addEventListener('click', () => { if (EMBED) parent.postMessage('goAlbum', '*'); else location.href = 'album-map.html'; }); // 点呼吸灯也可

document.getElementById('demoToggle').addEventListener('click', () => { recorded = !recorded; showBreath(recorded); });
showBreath(recorded);

render();
</script>
</body>
</html>
