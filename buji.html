<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>步集 BUJI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0a0a0f; min-height: 100dvh; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, "PingFang SC", sans-serif;
  }
  /* 真·手机外壳（两屏共用，固定不动） */
  .phone-shell {
    width: 430px; height: 932px; border-radius: 54px; overflow: hidden; position: relative;
    background: #000; box-shadow: 0 0 0 2px #2a2a30, 0 30px 80px rgba(0,0,0,0.8);
  }
  @media (max-height: 960px) { .phone-shell { transform: scale(0.86); transform-origin: center; } }
  @media (max-height: 820px) { .phone-shell { transform: scale(0.74); transform-origin: center; } }
  @media (max-height: 720px) { .phone-shell { transform: scale(0.64); transform-origin: center; } }

  /* 垂直滑动轨道：高 200%（两屏），translateY 切换 */
  .track {
    position: absolute; left: 0; top: 0; width: 100%; height: 200%;
    transition: transform 0.52s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .track iframe { display: block; width: 100%; height: 50%; border: 0; }
</style>
</head>
<body>
  <div class="phone-shell">
    <div class="track" id="track">
      <!-- 第 0 屏：发现页（embed 模式：去外壳；recorded=1：默认呼吸灯，可上滑） -->
      <iframe id="f0" src="discover-page.html#embed=1&recorded=1"></iframe>
      <!-- 第 1 屏：相册地图（embed 模式） -->
      <iframe id="f1" src="album-map.html#embed=1"></iframe>
    </div>
  </div>

  <script>
    const track = document.getElementById('track');
    let page = 0;                    // 0=发现页, 1=相册地图
    function goTo(p) {
      page = p;
      track.style.transform = 'translateY(' + (-p * 50) + '%)';   // -50% = 上移一屏
    }
    // 子页通过 postMessage 通知切换
    window.addEventListener('message', (e) => {
      if (e.data === 'goAlbum') goTo(1);        // 发现页上滑 → 相册地图
      else if (e.data === 'goDiscover') goTo(0); // 相册地图下滑 → 发现页
    });
  </script>
</body>
</html>
