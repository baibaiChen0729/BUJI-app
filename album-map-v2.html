<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>步集 · 相册地图 v2（碰顶挤压 · 自由拖拽）</title>
<style>
  @font-face {
    font-family: 'momozhuanji';
    src: url('assets/fonts/momozhuanji.ttf') format('truetype');
    font-weight: 500; font-display: swap;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0a0a0f; font-family: -apple-system, "PingFang SC", sans-serif;
    min-height: 100dvh; overflow: hidden; display: flex; align-items: center; justify-content: center;
    color: #2e383f; user-select: none;
  }
  .phone-shell {
    width: 430px; height: 932px; background: #faf9f9; border-radius: 54px;
    box-shadow: 0 0 0 2px #2a2a30, 0 30px 80px rgba(0,0,0,0.8);
    overflow: hidden; position: relative;
  }
  @media (max-height: 960px) { .phone-shell { transform: scale(0.86); transform-origin: center; } }
  @media (max-height: 820px) { .phone-shell { transform: scale(0.74); transform-origin: center; } }
  @media (max-height: 720px) { .phone-shell { transform: scale(0.64); transform-origin: center; } }

  .status-bar { position: absolute; top: 0; left: 0; right: 0; height: 54px; z-index: 30; }
  .status-time {
    position: absolute; left: 59px; top: 21px; font-size: 17px; font-weight: 600; color: #141414;
    font-family: -apple-system, sans-serif; letter-spacing: 0;
  }
  .status-icons { position: absolute; right: 28px; top: 22px; display: flex; gap: 6px; align-items: center; color: #141414; }
  .status-icons svg { display: block; }

  .album-date {
    position: absolute; left: 39px; top: 94px; z-index: 20;
    font-family: 'momozhuanji', cursive; font-size: 32px; line-height: 40px; color: #2e383f;
  }
  .album-caption {
    position: absolute; left: 31px; top: 146px; z-index: 20;
    font-family: 'momozhuanji', cursive; font-size: 32px; line-height: 40px; color: #2e383f;
    letter-spacing: 2px;
  }

  /* 顶部渐隐遮罩：图碰上沿时柔和淡出（配合挤压），绝不硬边缘裁切。左右下正常裁切 */
  .stage {
    position: absolute; left: 0; top: 203px; right: 0; bottom: 0;
    overflow: hidden; touch-action: none; cursor: grab; z-index: 10;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, transparent 2px, #000 34px, #000 100%);
    mask-image: linear-gradient(to bottom, transparent 0, transparent 2px, #000 34px, #000 100%);
  }
  .stage.dragging { cursor: grabbing; }

  .photo-card {
    position: absolute; top: 0; left: 0; border-radius: 20px; overflow: hidden;
    box-shadow: 0 0 0 1px #ffffff, 0 4px 16px rgba(0,0,0,0.06); will-change: transform;
  }
  .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }

  .home-ind { position: absolute; left: 50%; bottom: 9px; transform: translateX(-50%); width: 139px; height: 5px; border-radius: 100px; background: #000; z-index: 40; }
</style>
</head>
<body>

<div class="phone-shell">
  <div class="status-bar">
    <div class="status-time">9:41</div>
    <div class="status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#141414"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#141414"><path d="M8.5 2.2c2.6 0 5 1 6.8 2.7l1.3-1.4A11.4 11.4 0 0 0 8.5.2 11.4 11.4 0 0 0 .4 3.5l1.3 1.4A9.4 9.4 0 0 1 8.5 2.2zm0 3.6c1.6 0 3.1.6 4.2 1.7l1.3-1.4a8 8 0 0 0-11 0l1.3 1.4A6 6 0 0 1 8.5 5.8zm0 3.5c.7 0 1.4.3 1.9.8l-1.9 2-1.9-2c.5-.5 1.2-.8 1.9-.8z"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#141414" stroke-opacity="0.4"/><rect x="2" y="2" width="18" height="9" rx="2" fill="#141414"/><path d="M24.5 4.5v4c1-.4 1-3.6 0-4z" fill="#141414" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="album-date" id="albumDate">6月23日</div>
  <div class="album-caption" id="caption">本人今天又出去玩了</div>

  <div class="stage" id="stage"></div>

  <div class="home-ind"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  步集 · 相册地图 v2 —— 自由拖拽 + 碰顶挤压
//   · 整张地图跟手平移（拖多少动多少，1:1）→ 明确的拖动感知
//   · 没碰上边缘的图：只跟着平移，绝不额外乱跳
//   · 唯一特殊：某张图顶碰到容器上沿 → 把【这一张】挤到当前最矮的列底部（多米诺式下沉）
//   · 左/右/下可被裁切；上边缘永不裁切（碰到就被挤下去）
//   · 中列顶部 = 焦点位，联动左上文案
// ══════════════════════════════════════════════════════════

const stage = document.getElementById('stage');

const ITEMS = [
  { src: 'assets/album/p1.png', h: 357 },
  { src: 'assets/album/p3.png', h: 360 },
  { src: 'assets/album/p4.png', h: 361 },
  { src: 'assets/album/p2.png', h: 361 },
  { src: 'assets/album/p6.png', h: 332 },
  { src: 'assets/album/p8.png', h: 333 },
  { src: 'assets/album/p5.png', h: 332 },
  { src: 'assets/album/p7.png', h: 403 },
];
const META = [
  { date: '6月23日', caption: '本人今天又出去玩了' },
  { date: '6月22日', caption: '看到一棵很好看的树' },
  { date: '6月20日', caption: '水里的倒影像另一个我' },
  { date: '6月18日', caption: '冰美式续命的一天' },
  { date: '6月15日', caption: '路边的小野花' },
  { date: '6月12日', caption: '阳光穿过叶子的缝隙' },
  { date: '6月10日', caption: '粉色的天空软软的' },
  { date: '6月08日', caption: '条纹和星星的下午' },
];

// 第一版精确布局：中列大图居中 + 两侧 270 宽列露窄边
const CW = 270, GAP = 18, COL_STEP = 288;
const CENTER_X = (430 - CW) / 2;        // 80
const LEFT_X = CENTER_X - COL_STEP;     // -208
const RIGHT_X = CENTER_X + COL_STEP;    // 368
const cols = [{ x: LEFT_X }, { x: CENTER_X }, { x: RIGHT_X }];  // 0 左 / 1 中(焦点) / 2 右
const CENTER = 1;

function makePhotoCard(src, w, h) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.style.width = w + 'px'; card.style.height = h + 'px';
  const img = document.createElement('img');
  img.src = src; img.draggable = false;
  card.appendChild(img);
  return card;
}

// live：当前所有卡片。absY = 在大画布上的绝对 y；屏幕 y = absY - panY
const live = [];
function addCard(seq, col, absY) {
  const idx = ((seq % ITEMS.length) + ITEMS.length) % ITEMS.length;
  const it = ITEMS[idx];
  const el = makePhotoCard(it.src, CW, it.h);
  stage.appendChild(el);
  live.push({ el, idx, col, h: it.h, absY, sliding: false, targetY: absY });
}

// 初始化：先按第一版 6 点位放好 6 张
addCard(0, 1, 37);    // 中·上（焦点，距顶 37）
addCard(1, 2, 124);   // 右·上
addCard(2, 0, 179);   // 左·上
addCard(3, 1, 412);   // 中·下
addCard(4, 2, 502);   // 右·下
addCard(5, 0, 558);   // 左·下
let nextSeq = 6;

// 各列底部（含正在下沉的目标）
function colBottoms() {
  const cb = [-1e9, -1e9, -1e9];
  for (const it of live) {
    const b = (it.sliding ? it.targetY : it.absY) + it.h;
    if (b > cb[it.col]) cb[it.col] = b;
  }
  return cb;
}
// 初始把下方填满约 1.5 屏，保证向上拖时下方有图
function fillDown() {
  let g = 0;
  while (g++ < 60) {
    const cb = colBottoms();
    let m = 0; for (let c = 1; c < 3; c++) if (cb[c] < cb[m]) m = c;
    if (cb[m] > stageH() + 320) break;
    addCard(nextSeq++, m, cb[m] + GAP);
  }
}
function stageH() { return stage.clientHeight || 729; }

let panY = 0, panX = 0, targetPanX = 0, vy = 0;
let dragging = false, raf = null, running = false, lastT = 0;

function render() {
  for (const it of live) {
    const x = cols[it.col].x + panX;
    const y = it.absY - panY;
    it.el.style.transform = `translate(${x}px, ${y}px)`;
  }
  updateFocus();
}
function updateFocus() {
  let best = null, bd = Infinity;
  for (const it of live) {
    if (it.col !== CENTER) continue;
    const sy = it.absY - panY;
    if (sy + it.h > 37 && sy < bd) { bd = sy; best = it; }
  }
  if (best) {
    document.getElementById('albumDate').textContent = META[best.idx].date;
    document.getElementById('caption').textContent = META[best.idx].caption;
  }
}

// 碰顶挤压：图顶触到容器上沿(屏幕 y<0) → 只把这一张挤到当前最矮列底部
function squeeze() {
  for (const it of live) {
    if (it.sliding) continue;
    if (it.absY - panY < 0) {
      const cb = colBottoms();
      let m = 0; for (let c = 1; c < 3; c++) if (cb[c] < cb[m]) m = c;
      it.col = m;
      it.targetY = cb[m] + GAP;
      it.sliding = true;   // 平滑下沉到较矮列底部
    }
  }
}

function step(dt) {
  let active = false;
  // 水平：橡皮筋（拖动时跟手感知左右，松手回正）
  panX += (targetPanX - panX) * 0.2;
  if (Math.abs(targetPanX - panX) > 0.3) active = true; else panX = targetPanX;
  // 垂直：松手后的惯性 / 到顶回弹
  if (!dragging) {
    if (panY < 0) { panY += (0 - panY) * 0.2; if (Math.abs(panY) < 0.5) panY = 0; else active = true; }
    else if (Math.abs(vy) > 0.02) { panY += vy * dt; vy *= Math.pow(0.94, dt / 16); if (panY < 0) { panY = 0; vy = 0; } active = true; }
  }
  // 碰顶挤压检查
  squeeze();
  // 正在下沉的图：缓动到目标（只有被挤的这张动）
  for (const it of live) {
    if (it.sliding) {
      it.absY += (it.targetY - it.absY) * 0.16;
      if (Math.abs(it.targetY - it.absY) < 0.6) { it.absY = it.targetY; it.sliding = false; }
      else active = true;
    }
  }
  render();
  return active || dragging;
}
function loop(now) {
  const dt = Math.min(40, now - lastT); lastT = now;
  if (step(dt)) raf = requestAnimationFrame(loop); else running = false;
}
function ensureLoop() { if (!running) { running = true; lastT = performance.now(); raf = requestAnimationFrame(loop); } }

fillDown();
render();

// ── 拖拽：自由跟手平移（垂直滚动 + 水平感知）──────────────
let sx0, sy0, panY0, lastPanY, lastTime;
stage.addEventListener('pointerdown', e => {
  cancelAnimationFrame(raf); running = false;
  dragging = true; stage.classList.add('dragging');
  sx0 = e.clientX; sy0 = e.clientY; panY0 = panY; vy = 0; lastPanY = panY; lastTime = performance.now();
  stage.setPointerCapture && stage.setPointerCapture(e.pointerId);
  ensureLoop();
});
stage.addEventListener('pointermove', e => {
  if (!dragging) return;
  const now = performance.now(), dt = now - lastTime;
  let ny = panY0 - (e.clientY - sy0);   // 向上拖 → panY 增 → 图上移
  if (ny < 0) ny *= 0.4;                // 到顶橡皮筋
  if (dt > 0) vy = 0.7 * vy + 0.3 * (ny - lastPanY) / dt;
  lastPanY = ny; lastTime = now; panY = ny;
  const dx = e.clientX - sx0;
  targetPanX = Math.max(-48, Math.min(48, dx * 0.4));   // 水平感知（限幅）
  ensureLoop();
});
function onUp() {
  if (!dragging) return;
  dragging = false; stage.classList.remove('dragging');
  targetPanX = 0;
  ensureLoop();
}
stage.addEventListener('pointerup', onUp);
stage.addEventListener('pointercancel', onUp);
</script>
</body>
</html>
