<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DotMaskCompositor · 最小示例</title>
<style>
  body { margin: 0; padding: 30px; background: #0e0e16; color: #eee;
         font-family: -apple-system, "PingFang SC", sans-serif;
         display: flex; flex-direction: column; align-items: center; gap: 18px; }
  h1 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: 1px; }
  .panel { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  button { background: #2a2a35; border: 1px solid #444; color: #eee;
           padding: 6px 12px; border-radius: 14px; font-size: 12px; cursor: pointer; }
  button.active { background: linear-gradient(135deg, #ffe0c4, #ffb8d6); color: #1a0a0f; border-color: transparent; }
  canvas { border-radius: 8px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
  .tip { font-size: 11px; color: #888; }
</style>
</head>
<body>

<h1>DotMaskCompositor · 最小用法</h1>

<canvas id="cv"></canvas>

<div class="panel" id="palettes"></div>
<div class="panel">
  <button id="randomBtn">🎲 随机波点</button>
  <button id="presetBtn">✦ Figma 8 点</button>
  <button id="swapBtn">⇅ 上下交换</button>
  <button id="shapeBtn">◇ 切换形状</button>
  <button id="saveBtn">💾 保存 PNG</button>
</div>
<div class="tip">默认尝试摄像头；不可用时自动用渐变 Demo 画面</div>

<script src="./dot-mask-compositor.js"></script>
<script>
const cv = document.getElementById('cv');

// 1. 创建合成器（最小配置）
const comp = new DotMaskCompositor({
  canvas: cv,
  ratio: '1:1',
  maxWidth: 360,
  dots: DotMaskCompositor.FIGMA_PRESET_DOTS,
  watermark: 'DotMask · DEMO',
});

// 2. 接入视频源（摄像头），失败回退到 demo 渐变
async function start() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }, audio: false,
    });
    const video = document.createElement('video');
    video.srcObject = stream; video.autoplay = true; video.playsInline = true; video.muted = true;
    await video.play();
    comp.setSource(video);
  } catch (e) {
    // Fallback: 动画渐变 canvas 当作 source
    const demo = document.createElement('canvas');
    demo.width = 640; demo.height = 480;
    const dc = demo.getContext('2d');
    function draw() {
      const t = Date.now() / 3000;
      const grd = dc.createLinearGradient(0, 0, 640, 480);
      grd.addColorStop(0,   `hsl(${(t * 30) % 360}, 60%, 55%)`);
      grd.addColorStop(0.5, `hsl(${(t * 30 + 120) % 360}, 60%, 60%)`);
      grd.addColorStop(1,   `hsl(${(t * 30 + 240) % 360}, 60%, 50%)`);
      dc.fillStyle = grd; dc.fillRect(0, 0, 640, 480);
      dc.fillStyle = 'rgba(255,255,255,0.45)';
      dc.font = 'bold 64px -apple-system';
      dc.textAlign = 'center'; dc.textBaseline = 'middle';
      dc.fillText('DEMO', 320, 240);
      requestAnimationFrame(draw);
    }
    draw();
    comp.setSource(demo);
  }
  comp.start();
}
start();

// 3. 色板按钮
const pal = document.getElementById('palettes');
DotMaskCompositor.PRESET_PALETTES.forEach((p, i) => {
  const b = document.createElement('button');
  b.textContent = p.name;
  b.className = i === 0 ? 'active' : '';
  b.onclick = () => {
    pal.querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    comp.setMaskColor(p.maskColor);
    comp.setDotColor(p.dotColor);
  };
  pal.appendChild(b);
});

// 4. 交互
document.getElementById('randomBtn').onclick = () => {
  comp.setDots(DotMaskCompositor.generateDots({ count: 10, baseSize: 20 }));
};
document.getElementById('presetBtn').onclick = () => {
  comp.setDots(DotMaskCompositor.FIGMA_PRESET_DOTS);
};
let swapped = false;
document.getElementById('swapBtn').onclick = () => { swapped = !swapped; comp.setSwapped(swapped); };

const SHAPES = ['circle', 'polygon', 'star', 'teardrop', 'char'];
let shapeIdx = 0;
document.getElementById('shapeBtn').onclick = () => {
  shapeIdx = (shapeIdx + 1) % SHAPES.length;
  comp.setShape(SHAPES[shapeIdx]);
  if (SHAPES[shapeIdx] === 'char') comp.setChar('喵');
};

document.getElementById('saveBtn').onclick = async () => {
  const link = document.createElement('a');
  link.download = `dotmask_${Date.now()}.png`;
  link.href = comp.toDataURL();
  link.click();
};
</script>
</body>
</html>
