<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1.0, user-scalable=no">
<title>步集 · 发布页</title>
<style>
  /* ================== 字体 ================== */
  @font-face {
    font-family: 'momozhuanji';
    src: url('assets/fonts/momozhuanji.ttf') format('truetype');
    font-weight: normal;    /* 字体文件仅 Regular 一档，声明 normal 避免合成加粗 */
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: #1a1a1a;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  /* ================== 手机外壳 · 430×932 ================== */
  .phone {
    position: relative; flex-shrink: 0;
    width: 430px;
    height: 932px;
    background: #F9F9F9;          /* Figma 发布页背景 */
    border-radius: 54px;          /* Figma 外壳圆角 */
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,0.6);
    transform-origin: center center;
  }

  /* Figma 头部渐变/光斑：设计稿中已隐藏（visible=false），不显示 */

  /* ================== 状态栏 · 0,0 · 430×59 ================== */
  .status-bar {
    position: absolute; left: 0; top: 0;
    width: 430px; height: 59px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 30px;
    padding-top: 21px;
    font-family: "SF Pro", -apple-system, "PingFang SC", sans-serif;
    font-size: 17px; font-weight: 590;
    color: #141414;
    z-index: 20;
  }
  .status-bar .levels { display: flex; align-items: center; gap: 7px; }
  .status-bar .signal, .status-bar .wifi { width: 18px; height: 12px; fill: #141414; }
  .status-bar .battery {
    position: relative;
    width: 25px; height: 13px;
    border: 1px solid rgba(20,20,20,0.35);
    border-radius: 3.5px;
    display: flex; align-items: center; padding: 1px;
  }
  .status-bar .battery::after {
    content: ""; position: absolute; right: -3px; top: 50%;
    width: 1.5px; height: 4px; background: rgba(20,20,20,0.4);
    border-radius: 1px; transform: translateY(-50%);
  }
  .status-bar .battery-cap { width: 21px; height: 9px; background: #141414; border-radius: 2px; }

  /* ================== 返回按钮 · x=20,y=67 · 24×24 ================== */
  .nav-back {
    position: absolute;
    left: 20px; top: 67px;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 15;
  }
  .nav-back svg { width: 24px; height: 24px; }

  /* ================== 日期 + 文案区 · Frame 2116747358 ================== */
  /* 未输入 x=31 y=118；输入态 y=122（JS 切换）*/
  .content-area {
    position: absolute;
    left: 31px;
    width: 370px;
    z-index: 10;
    transition: top 0.18s ease;
  }
  .content-area.empty  { top: 118px; }
  .content-area.filled { top: 122px; }

  /* 日期 · momozhuanji 32px Regular #2E383F · lineHeight 40 */
  .date-title {
    width: 370px; height: 40px;
    font-family: 'momozhuanji', -apple-system, "PingFang SC", sans-serif;
    font-size: 32px;
    font-weight: 400;         /* Figma momozhuanji-Regular（标注500，实为Regular）*/
    color: #2E383F;
    line-height: 40px;
  }

  /* 文案帧 · Frame 2116747357 · margin-top 12（170-118-40）*/
  .input-frame {
    position: relative;
    width: 370px;
    margin-top: 12px;
    min-height: 43px;
    display: flex; align-items: flex-start;
  }
  /* 自定义光标（Vector 4048：0×36 stroke=#2E383F）*/
  .input-frame .cursor {
    position: absolute;
    left: 0; top: 4px;
    width: 1px; height: 36px;
    background: #2E383F;
    animation: blink 1.06s steps(1) infinite;
    opacity: 0;
    flex-shrink: 0;
  }
  .content-area.editing .cursor { opacity: 1; }
  @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }

  /* 文案输入 · momozhuanji 32px Regular · lineHeight 40 · ls 1px */
  /* placeholder: #6E593D op0.30 → rgba(110,89,61,0.30) */
  .input-frame .text {
    padding-left: 0;
    font-family: 'momozhuanji', -apple-system, "PingFang SC", sans-serif;
    font-size: 32px;
    font-weight: 400;         /* 关键：Regular，避免浏览器合成加粗 */
    line-height: 40px;        /* Figma lineHeightPx 40 */
    letter-spacing: 1px;      /* Figma letterSpacing 1.0 */
    color: rgba(110, 89, 61, 0.30);
    outline: none;
    caret-color: transparent;
    background: transparent;
    border: none;
    flex: 1;
    resize: none;
    overflow: hidden;
    min-height: 40px;
    word-break: break-all;
  }
  .input-frame .text::placeholder { color: rgba(110, 89, 61, 0.30); }
  .content-area.filled .input-frame .text { color: #2E383F; }

  /* ========== 布局容器 · Figma Frame 2116747384 · x=35,y=272 · 361×509 ========== */
  /* 仅定义范围 + 居中，本身透明无视觉属性；图片带着自己的圆角/描边/阴影居中 */
  .photo-card {
    position: absolute;
    left: 35px; top: 272px;
    width: 361px; height: 509px;               /* 固定容器范围（Figma 361×509）*/
    display: flex; align-items: center; justify-content: center;
    z-index: 8;
  }
  /* 图片自身属性：宽361、高按比例 + 圆角22 + 白描边 + 阴影（随图片走，变矮时一起变）*/
  .photo-card img.photo {
    display: block;
    width: 361px; height: auto;                 /* 高按原始比例，容器内垂直居中，不拉伸 */
    border-radius: 22px;                        /* Figma cr≈21.7 */
    border: 1px solid #ffffff;                  /* Figma stroke=#FFFFFF sw=1 */
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);    /* Figma effect 0 4 16 #000/0.06 */
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ================== 主按钮 · x=143,y=818 · 144×56 · 圆角80 ================== */
  /* 未输入: 透明填充(fill HIDDEN) + 灰描边 rgba(0,0,0,0.27) + 灰字 → 线性描边按钮 */
  /* 输入态: 实心#2E383F + 描边 rgba(21,41,56,0.30) + 白字                       */
  .cta {
    position: absolute;
    left: 143px; top: 818px;
    width: 144px; height: 56px;
    background: transparent;                /* Figma 未输入态 fill 为 HIDDEN */
    border-radius: 28px;                    /* cr=80 → 全圆角胶囊 */
    border: 1px solid rgba(0, 0, 0, 0.27);  /* 未激活：灰色描边 */
    font-family: "PingFang SC", -apple-system, sans-serif;
    font-size: 18px; font-weight: 600;      /* Figma PingFangSC-Semibold 18px */
    color: rgba(0, 0, 0, 0.27);             /* 未激活：灰字 */
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 4px;
    transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.15s;
    z-index: 10;
  }
  .cta.active {
    background: #2E383F;                     /* 激活：实心填充 */
    color: #ffffff;                         /* 激活：白字 */
    border-color: rgba(21, 41, 56, 0.30);   /* Figma 激活描边 #152938/0.30 */
  }
  .cta.loading {
    background: #2E383F;
    color: #ffffff;
    border-color: rgba(21, 41, 56, 0.30);
    opacity: 0.75;
    cursor: default;
  }
  .cta:active { transform: scale(0.97); }

  /* ================== Home Indicator · x=143,y=919 · 139×5 ================== */
  .home-indicator {
    position: absolute;
    left: 143px; top: 919px;
    width: 139px; height: 5px;
    background: #000;
    border-radius: 3px;
    z-index: 10;
  }

  /* ================== 顶部状态切换器 (开发调试用) ================== */
  .state-switch {
    position: fixed;
    top: 20px; left: 20px;
    display: flex; gap: 8px;
    z-index: 100;
    background: rgba(255,255,255,0.05);
    padding: 8px; border-radius: 12px;
    backdrop-filter: blur(20px);
  }
  .state-switch button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: -apple-system, "PingFang SC", sans-serif;
  }
  .state-switch button.on {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.4);
  }

  .phone { transform-origin: center center; }

  /* embed 模式：铺满父容器 */
  body.embed {
    background: transparent;
    align-items: stretch;
    justify-content: stretch;
    overflow: hidden;
  }
  body.embed .phone {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    box-shadow: none;
    border-radius: 0;
    transform: none;
  }
  body.embed .state-switch { display: none; }
</style>
</head>
<body>

<div class="state-switch">
  <button id="btn-empty" class="on">未输入</button>
  <button id="btn-filled">输入中</button>
</div>

<div class="phone">

  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="time">9:41</div>
    <div class="levels">
      <svg class="signal" viewBox="0 0 19 12" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="8" width="3" height="4" rx="0.5"/>
        <rect x="5" y="5" width="3" height="7" rx="0.5"/>
        <rect x="10" y="2" width="3" height="10" rx="0.5"/>
        <rect x="15" y="0" width="3" height="12" rx="0.5"/>
      </svg>
      <svg class="wifi" viewBox="0 0 17 12" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.5 2.4C11 2.4 13.3 3.35 15 4.9L16.6 3.3C14.4 1.25 11.55 0 8.5 0S2.6 1.25 0.4 3.3L2 4.9C3.7 3.35 6 2.4 8.5 2.4Z"/>
        <path d="M8.5 6.4C10.05 6.4 11.5 6.95 12.6 7.95L14.15 6.4C12.65 4.95 10.7 4.05 8.5 4.05S4.35 4.95 2.85 6.4L4.4 7.95C5.5 6.95 6.95 6.4 8.5 6.4Z"/>
        <path d="M8.5 10C9.6 10 10.55 10.45 11.2 11.15L8.5 12L5.8 11.15C6.45 10.45 7.4 10 8.5 10Z"/>
      </svg>
      <div class="battery"><div class="battery-cap"></div></div>
    </div>
  </div>

  <!-- 返回按钮 · x=20,y=67 · 24×24 -->
  <div class="nav-back" id="nav-back" onclick="handleBack()">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5.2003 11.8522C5.13217 11.9285 5.13213 12.0451 5.2002 12.1214L11.7723 19.4938C12.1005 19.862 12.0737 20.4316 11.7124 20.766C11.3511 21.1005 10.7922 21.0731 10.464 20.705L3.23157 12.5919C2.92524 12.2482 2.92544 11.7236 3.23202 11.3802L10.4509 3.29455C10.7794 2.92664 11.3383 2.89973 11.6994 3.23444C12.0604 3.56916 12.0868 4.13875 11.7584 4.50666L5.2003 11.8522Z" fill="black" fill-opacity="0.8"/>
    </svg>
  </div>

  <!-- 日期 + 文案区 -->
  <div class="content-area empty" id="content-area">
    <div class="date-title" id="date-title">6月24日</div>
    <div class="input-frame" id="input-frame">
      <div class="cursor"></div>
      <div class="text" id="text-input"
           contenteditable="true"
           data-placeholder="记录让幸福可以翻阅">记录让幸福可以翻阅</div>
    </div>
  </div>

  <!-- 照片卡 · 纯图铺满（无角标/分半/波点），外部描边+阴影 -->
  <div class="photo-card" id="photo-card">
    <img class="photo" src="assets/publish/photo-main.jpg" alt="" id="photo-img">
  </div>

  <!-- 主按钮 · 三态：未输入(灰字) / 输入(白字) / 发布中 -->
  <button class="cta" id="cta" onclick="handleSubmit()">好啦</button>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>

<script src="assets/api.js"></script>
<script>
  // embed 模式支持
  const IS_EMBED = location.hash.includes('embed=1');
  if (IS_EMBED) {
    document.body.classList.add('embed');
  } else {
    const _phone = document.querySelector('.phone');
    const fitPhone = () => {
      const scale = Math.min(1, (window.innerWidth - 24) / 430, (window.innerHeight - 24) / 932);
      _phone.style.setProperty('transform', `scale(${scale})`, 'important');
    };
    fitPhone();
    window.addEventListener('resize', fitPhone);
  }

  function nav(page, params) {
    const parts = [];
    if (IS_EMBED) parts.push('embed=1');
    if (params) parts.push(params);
    location.href = page + (parts.length ? '#' + parts.join('&') : '');
  }
  function go(msg, page, params) {
    if (IS_EMBED) parent.postMessage(msg, '*');
    else nav(page, params);
  }

  // 读取相机草稿图：图片宽361、高按原始比例，在固定容器(361×509)内居中显示（不拉伸）
  function refreshDraft() {
    const img = document.getElementById('photo-img');
    if (!img) return;
    let draft = null;
    try { draft = localStorage.getItem('buji_draft'); } catch (e) {}
    if (draft) img.src = draft;             // 有草稿：用拍照原图；容器 flex 自动居中
  }
  refreshDraft();

  // 日期
  (function setDate() {
    const now = new Date();
    document.getElementById('date-title').textContent = `${now.getMonth() + 1}月${now.getDate()}日`;
  })();

  const contentArea = document.getElementById('content-area');
  const textInput   = document.getElementById('text-input');
  const cta         = document.getElementById('cta');
  const btnEmpty    = document.getElementById('btn-empty');
  const btnFilled   = document.getElementById('btn-filled');

  btnEmpty.addEventListener('click',  () => setEmpty());
  btnFilled.addEventListener('click', () => setFilled('本人今天又出去玩了'));

  function setEmpty() {
    textInput.textContent = '记录让幸福可以翻阅';
    contentArea.className = 'content-area empty';
    cta.classList.remove('active');
    btnEmpty.classList.add('on');
    btnFilled.classList.remove('on');
  }
  function setFilled(text) {
    textInput.textContent = text;
    contentArea.className = 'content-area filled';
    cta.classList.add('active');
    btnEmpty.classList.remove('on');
    btnFilled.classList.add('on');
  }

  textInput.addEventListener('focus', () => {
    if (textInput.textContent === '记录让幸福可以翻阅') textInput.textContent = '';
    contentArea.classList.add('editing', 'filled');
    contentArea.classList.remove('empty');
  });
  textInput.addEventListener('blur', () => {
    contentArea.classList.remove('editing');
    if (!textInput.textContent.trim()) setEmpty();
  });
  textInput.addEventListener('input', () => {
    const has = textInput.textContent.trim().length > 0;
    cta.classList.toggle('active', has);
    if (has) { contentArea.classList.remove('empty'); contentArea.classList.add('filled'); }
  });

  function handleBack() {
    go('closeOverlay', 'discover-page.html', 'recorded=1');
  }

  async function handleSubmit() {
    if (!cta.classList.contains('active')) return;
    if (cta.classList.contains('loading')) return;

    let draft = null;
    try { draft = localStorage.getItem('buji_draft'); } catch (e) {}
    if (!draft) { showToast('还没有拍照哦'); return; }

    let caption = (textInput.textContent || '').trim();
    if (caption === '记录让幸福可以翻阅') caption = '';

    // 发布中态
    cta.classList.add('loading');
    const origText = cta.textContent;
    cta.textContent = '发布中…';

    try {
      const today = new Date().toISOString().slice(0, 10);
      await api('POST', '/v1/posts', { image: draft, caption, date: today });
      try { localStorage.removeItem('buji_draft'); } catch (e) {}
      showToast('保存成功');
      setTimeout(() => go('publishDone', 'album-map.html'), 900);
    } catch (err) {
      console.error('[publish] 发布失败:', err);
      showToast('发布失败：' + (err.message || '网络错误'));
      cta.classList.remove('loading');
      cta.textContent = origText;
    }
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    Object.assign(t.style, {
      position: 'fixed', left: '50%', bottom: '120px',
      transform: 'translateX(-50%)',
      background: 'rgba(46,56,63,0.92)', color: '#fff',
      padding: '12px 24px', borderRadius: '24px',
      fontSize: '14px', zIndex: 200,
      backdropFilter: 'blur(20px)',
      boxShadow: '0 12px 40px rgba(0,0,0,0.4)',
      opacity: '0', transition: 'opacity 0.3s, transform 0.3s',
    });
    document.body.appendChild(t);
    requestAnimationFrame(() => {
      t.style.opacity = '1';
      t.style.transform = 'translateX(-50%) translateY(-8px)';
    });
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 1600);
  }

  window.addEventListener('message', e => {
    if (e.data && (e.data.type === 'refresh' || e.data === 'refresh')) refreshDraft();
  });
</script>

</body>
</html>
