<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>步集 · 发现页</title>
<style>
  @font-face {
    font-family: 'momozhuanji';
    src: url('assets/fonts/momozhuanji.ttf') format('truetype');
    font-weight: 500; font-display: swap;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0a0a0f; font-family: -apple-system, "PingFang SC", sans-serif;
    height: 100dvh; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    color: #2e383f; user-select: none;
  }
  /* 独立预览：flex 居中 + JS 纯 scale 缩放（body 固定高不撑开，整机永远完整居中不截断）*/
  .phone-shell {
    position: relative; flex-shrink: 0;
    width: 430px; height: 932px; background: #faf9f9; border-radius: 54px;
    box-shadow: 0 0 0 2px #2a2a30, 0 30px 80px rgba(0,0,0,0.8);
    overflow: hidden;
    transform-origin: center center;
  }

  /* ── 顶部光斑（Figma Ellipse 2827/2828，淡蓝双椭圆 + blur）── */
  .bg-gradient {
    position: absolute; left: 0; top: 0; right: 0; height: 0;
    z-index: 1; pointer-events: none; overflow: visible;
  }
  .bg-gradient::before, .bg-gradient::after {
    content: ''; position: absolute; border-radius: 50%;
  }
  /* Ellipse 2827（大）: (-40,-178) 276×251 · rgba(218,235,240,0.8) · blur 169.4 */
  .bg-gradient::before {
    left: -40px; top: -178px; width: 276px; height: 251px;
    background: rgba(218, 235, 240, 0.80);
    filter: blur(100px);
  }
  /* Ellipse 2828: (243,-144) 254×254 · rgba(205,233,241,0.8) · blur 168.5 */
  .bg-gradient::after {
    left: 243px; top: -144px; width: 254px; height: 254px;
    background: rgba(205, 233, 241, 0.80);
    filter: blur(100px);
  }

  .status-bar { position: absolute; top: 0; left: 0; right: 0; height: 59px; z-index: 30; }
  .status-time { position: absolute; left: 59px; top: 21px; font-size: 17px; font-weight: 600; color: #141414; font-family: -apple-system, sans-serif; }
  .status-icons { position: absolute; right: 28px; top: 24px; display: flex; gap: 6px; align-items: center; }
  .status-icons svg { display: block; }

  .greet-hi { position: absolute; left: 31px; top: 94px; font-family: 'momozhuanji', cursive; font-size: 32px; line-height: 40px; color: #2E383F; z-index: 5; }
  .greet-sub { position: absolute; left: 31px; top: 146px; font-family: 'momozhuanji', cursive; font-size: 32px; line-height: 40px; letter-spacing: 0.0313em; color: #2E383F; z-index: 5; }

  /* ══════════════════════════════════════════════════════
     任务卡台（Figma 卡片模板 476:2795 · 322×387 圆角矩形贴纸）
     两卡「中心重合」扇形叠放，旋转角度绑定颜色：
       深色卡 dark  → card-shape-dark.svg  (#5C748B) · 固定 rotate +6°
       浅色卡 light → card-shape-light.svg (#C2D1DF) · 固定 rotate -2°
     翻页只交换 z-index + 内容（角度不随前后变）。
     卡中心 = 页面 (215.5, 462.5)；deck = 卡尺寸定位于 (54,269)。
     ══════════════════════════════════════════════════════ */
  .deck {
    position: absolute; left: 54px; top: 269px;
    width: 322px; height: 387px;
    z-index: 6; touch-action: none;
  }
  .task-card {
    position: absolute; left: 0; top: 0; width: 322px; height: 387px;
    cursor: grab; will-change: transform;
    transform-origin: center center;
    filter: drop-shadow(0 10px 22px rgba(40,60,80,0.16));
  }

  /* 圆角矩形贴纸背景（正放矢量 SVG，含顶部小花孔 + 噪点纹理）*/
  .task-card .card-subtract {
    position: absolute; inset: 0;
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
    pointer-events: none;
  }
  .task-card.dark  .card-subtract { background-image: url('assets/discover/card-shape-dark.svg'); }
  .task-card.light .card-subtract { background-image: url('assets/discover/card-shape-light.svg'); }

  /* 标题（momozhuanji 24px 500, ls 8.33%, lineHeight 1.5em）相对卡 (27,128) w267，卡内再 -1° */
  .task-title {
    position: absolute;
    left: 27px; top: 128px; width: 267px;
    font-family: 'momozhuanji', cursive;
    font-size: 24px; font-weight: 500;
    line-height: 1.50em;
    letter-spacing: 0.0833em;
    text-align: center;
    transform: rotate(-1deg); transform-origin: center;
    z-index: 2;
  }
  .task-card.dark  .task-title { color: #FFFFFF; }
  .task-card.light .task-title { color: #2E383F; }

  /* 配图（右下角照片 · 相对卡 163,225 · 112×108）*/
  .task-pic-wrap {
    position: absolute;
    left: 163px; top: 225px;
    width: 112px; height: 108px;
    border-radius: 8px; overflow: hidden;
    z-index: 3;
  }
  .task-pic-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* Figma layout_P6MB0T: x:1 y:690 w:429 */
  .pager { position: absolute; left: 1px; top: 690px; width: 429px; height: 6px; display: flex; justify-content: center; align-items: center; gap: 5px; z-index: 8; }
  .pager .dot { width: 5px; height: 5px; border-radius: 50%; background: #303034; opacity: .2; transition: all .3s; }
  .pager .dot.active { background: #152938; opacity: 1; width: 6px; height: 6px; }

  .btn-go {
    position: absolute; left: 143px; top: 756px; width: 144px; height: 56px;
    background: #2E383F; border-radius: 80px;
    border: 1px solid rgba(21, 41, 56, 0.30);   /* Figma stroke_BRL3DM */
    cursor: pointer;
    color: #fff; font-size: 18px; font-weight: 600; font-family: -apple-system, "PingFang SC", sans-serif;
    display: flex; align-items: center; justify-content: center; z-index: 20;
    transition: transform .15s, opacity .15s;
  }
  .btn-go:active { transform: scale(0.96); opacity: .9; }

  /* 下滑提示（状态2 · Figma 472:2706）：底部渐变矩形 + 「下滑查看我的步集」，3 秒后淡出 */
  .breath {
    position: absolute; left: 0; right: 0; bottom: 0; height: 142px; z-index: 12;
    pointer-events: none; opacity: 0; touch-action: none;
    /* Figma fill_2X9B1V：180deg 顶部透明 36% → 底部实色 rgba(205,233,255) */
    background: linear-gradient(180deg, rgba(220,240,255,0) 36%, rgba(205,233,255,1) 100%);
    transition: none;
  }
  .breath.show {
    pointer-events: auto; cursor: pointer;
    animation: breathShow 3s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes breathShow {
    0%   { opacity: 0; }
    13%  { opacity: 1; }
    87%  { opacity: 1; }
    100% { opacity: 0; pointer-events: none; }
  }
  /* Caption/C1: PingFang SC 13px 400, rgba(0,0,0,0.27) · 文字 y863 → bottom 49 */
  .breath-text {
    position: absolute; left: 0; right: 0; bottom: 49px; text-align: center;
    font-size: 13px; color: rgba(0,0,0,0.27); font-family: -apple-system, "PingFang SC", sans-serif;
    font-weight: 400;
  }

  .home-ind { position: absolute; left: 50%; bottom: 9px; transform: translateX(-50%); width: 139px; height: 5px; border-radius: 100px; background: #000; z-index: 40; }

  .demo-toggle { position: absolute; right: 14px; top: 64px; z-index: 50; font-size: 11px; background: rgba(0,0,0,.5); color: #fff; border: none; border-radius: 8px; padding: 5px 8px; cursor: pointer; }

  /* embed 模式（被 buji.html 容器以 iframe 嵌入时）：
     等比缩放（scale fit-to-iframe）确保「去记录」按钮等所有控件始终可见，不被截断 */
  body.embed { background: #faf9f9; align-items: flex-start; overflow: hidden; }
  body.embed .phone-shell {
    box-shadow: none; border-radius: 0;
    position: relative; flex-shrink: 0;
    width: 430px; height: 932px;
    transform-origin: top center !important;
    transform: scale(1) !important;
  }
  body.embed .demo-toggle { display: none; }
</style>
</head>
<body>

<div class="phone-shell">

  <!-- 顶部渐变光斑（Figma Ellipse 2827 切图 → bg-gradient.png） -->
  <div class="bg-gradient"></div>

  <div class="status-bar">
    <div class="status-time">9:41</div>
    <div class="status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#141414"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#141414"><path d="M8.5 2.2c2.6 0 5 1 6.8 2.7l1.3-1.4A11.4 11.4 0 0 0 8.5.2 11.4 11.4 0 0 0 .4 3.5l1.3 1.4A9.4 9.4 0 0 1 8.5 2.2zm0 3.6c1.6 0 3.1.6 4.2 1.7l1.3-1.4a8 8 0 0 0-11 0l1.3 1.4A6 6 0 0 1 8.5 5.8zm0 3.5c.7 0 1.4.3 1.9.8l-1.9 2-1.9-2c.5-.5 1.2-.8 1.9-.8z"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#141414" stroke-opacity="0.4"/><rect x="2" y="2" width="18" height="9" rx="2" fill="#141414"/><path d="M24.5 4.5v4c1-.4 1-3.6 0-4z" fill="#141414" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="greet-hi">Hi！</div>
  <div class="greet-sub">今天去这里吧～</div>

  <div class="deck" id="deck">
    <!-- 深色卡（初始在前，占满）-->
    <div class="task-card dark" id="cardA">
      <div class="card-subtract"></div>
      <div class="task-title" id="titleA"></div>
      <div class="task-pic-wrap" id="picWrapA"></div>
    </div>
    <!-- 浅色卡（初始在后，偏移露出）-->
    <div class="task-card light" id="cardB">
      <div class="card-subtract"></div>
      <div class="task-title" id="titleB"></div>
      <div class="task-pic-wrap" id="picWrapB"></div>
    </div>
  </div>

  <div class="pager" id="pager"></div>

  <button class="btn-go" id="btnGo">去记录</button>

  <!-- 第一次记录后：呼吸灯 +「上滑查看我的步集」 -->
  <div class="breath" id="breath">
    <div class="breath-text">下滑查看我的步集</div>
  </div>

  <div class="home-ind"></div>

  <button class="demo-toggle" id="demoToggle">模拟“已记录”</button>
</div>

<script src="assets/api.js"></script>
<script>
// ── 任务卡数据源：由后端 /v1/tasks/today 下发 ──
// 启动时兜底一份（网络失败时可看到界面），随后被真实数据替换
let TASKS = [
  { title: '正在加载今日任务…', image: '' },
];
let N = TASKS.length;

// 尝试拿定位（用户拒绝或不支持时降级为无位置）
function getLocation(timeoutMs = 3000) {
  return new Promise(resolve => {
    if (!navigator.geolocation) return resolve(null);
    let done = false;
    const t = setTimeout(() => { if (!done) { done = true; resolve(null); } }, timeoutMs);
    navigator.geolocation.getCurrentPosition(
      pos => { if (!done) { done = true; clearTimeout(t); resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); } },
      ()  => { if (!done) { done = true; clearTimeout(t); resolve(null); } },
      { timeout: timeoutMs, maximumAge: 5 * 60 * 1000 }
    );
  });
}

async function loadTasks() {
  try {
    const loc = await getLocation();
    const q = loc ? `?lat=${loc.lat}&lng=${loc.lng}&count=6` : '?count=6';
    const data = await api('GET', '/v1/tasks/today' + q);
    if (data.tasks && data.tasks.length) {
      TASKS = data.tasks;
      N = TASKS.length;
      // 重建页码 + 重新填卡
      pager.innerHTML = '';
      for (let i = 0; i < N; i++) {
        const d = document.createElement('div');
        d.className = 'dot' + (i === 0 ? ' active' : '');
        pager.appendChild(d);
      }
      index = 0;
      render();
    }
  } catch (e) {
    console.warn('[discover] 加载任务失败，使用占位:', e.message);
  }
}
function _param(k) { return new URLSearchParams(location.search).get(k) || new URLSearchParams(location.hash.slice(1)).get(k); }
const EMBED = _param('embed') === '1';
if (EMBED) document.body.classList.add('embed');

// ── 等比缩放：绝对定位居中 + translate scale，保证整机完整可见不截断 ──
const _shell = document.querySelector('.phone-shell');
const fitShell = () => {
  const sw = 430, sh = 932, pad = EMBED ? 0 : 24;
  const scale = Math.min(1, (window.innerWidth - pad) / sw, (window.innerHeight - pad) / sh);
  _shell.style.setProperty('transform', `scale(${scale})`, 'important');
};
fitShell();
window.addEventListener('resize', fitShell);

// 统一整页跳转：iframe 内续传 embed 语境，独立打开则用各自完整手机外壳
function nav(page, params) {
  const parts = [];
  if (EMBED) parts.push('embed=1');
  if (params) parts.push(params);
  location.href = page + (parts.length ? '#' + parts.join('&') : '');
}
// 在 buji 容器内：发 postMessage 触发滑动/覆盖层；独立打开：整页跳转
// 命名为 route，避免与下方卡片轮播的 go(dir) 冲突
function route(msg, page, params) {
  if (EMBED) parent.postMessage(msg, '*');
  else nav(page, params);
}

const deck = document.getElementById('deck');
const pager = document.getElementById('pager');
// 两卡固定角色：深色 dark 恒 +6°、浅色 light 恒 -2°（角度绑定颜色，中心重合扇形叠放）。
// 翻页只交换 z-index + 内容，角度不随前后变。
let topCard    = document.getElementById('cardA');  // dark，初始顶层
let bottomCard = document.getElementById('cardB');  // light，初始底层
let index = 0, animating = false;
const EASE = 'cubic-bezier(.34,.06,.2,1)';

// 角度绑定颜色：dark → +6°，light → -2°
function baseT(card) { return card.classList.contains('dark') ? 'rotate(6deg)' : 'rotate(-2deg)'; }

// 配图接口未就位时的设计默认照片（Figma 卡片配图导出）
const DEFAULT_PIC = 'assets/discover/card-photo.png';

// 页码
for (let i = 0; i < N; i++) { const d = document.createElement('div'); d.className = 'dot' + (i === 0 ? ' active' : ''); pager.appendChild(d); }
function syncPager() { [...pager.children].forEach((d, i) => d.classList.toggle('active', i === index)); }

// fillCard：填标题 + 配图（无接口图时用设计默认照片兜底）
function fillCard(el, taskIdx) {
  const t = TASKS[((taskIdx % N) + N) % N];
  el.querySelector('.task-title').innerHTML = t.title.replace(/\n/g, '<br>');
  el.querySelector('.task-pic-wrap').innerHTML = `<img src="${t.image || DEFAULT_PIC}" alt="">`;
}

function settle() {   // 瞬时落位：两卡回各自基础角度，top 在上
  topCard.style.transition = bottomCard.style.transition = 'none';
  topCard.style.transform = baseT(topCard);       topCard.style.zIndex = 2; topCard.style.opacity = '1';
  bottomCard.style.transform = baseT(bottomCard); bottomCard.style.zIndex = 1; bottomCard.style.opacity = '1';
}
function render() { fillCard(topCard, index); fillCard(bottomCard, index + 1); settle(); syncPager(); }

// ── 翻页：顶层卡朝拖动方向飞出 → 底层升顶 → 飞出卡换新内容回到背后 ──
//    无论左拖右拖都「往后翻一张、切到背后」；flyDir 仅决定飞出方向（跟手）。
function go(flyDir) {                          // flyDir=-1 左飞 / +1 右飞
  if (animating) return; animating = true;
  const t = topCard, b = bottomCard;
  const baseDeg = t.classList.contains('dark') ? 6 : -2;
  t.style.transition = `transform .45s ${EASE}, opacity .45s ${EASE}`;
  t.style.transform = `translate(${flyDir * 440}px, 30px) rotate(${baseDeg + flyDir * 12}deg)`;
  t.style.opacity = '0';
  const onEnd = (e) => {
    if (e.propertyName !== 'transform') return;
    t.removeEventListener('transitionend', onEnd);
    topCard = b; bottomCard = t;                  // 交换前后（深浅顶层对调）
    index = ((index + 1) % N + N) % N;            // 始终往后翻一张
    fillCard(t, index + 1);                        // 飞出卡填「下一张」，回到背后
    settle();                                      // 瞬时落位（回基础角度、opacity 1）
    requestAnimationFrame(() => requestAnimationFrame(() => {
      topCard.style.transition = bottomCard.style.transition = '';
      animating = false; syncPager();
    }));
  };
  t.addEventListener('transitionend', onEnd);
}

// ── 拖拽顶层卡（跟手 + 松手顺势）──
let dragging = false, sx = 0, dx = 0;
deck.addEventListener('pointerdown', e => {
  if (animating) return;
  dragging = true; sx = e.clientX; dx = 0;
  topCard.style.transition = 'none';
  deck.setPointerCapture && deck.setPointerCapture(e.pointerId);
});
deck.addEventListener('pointermove', e => {
  if (!dragging) return;
  dx = e.clientX - sx;
  const baseDeg = topCard.classList.contains('dark') ? 6 : -2;
  topCard.style.transform = `translate(${dx}px, ${Math.abs(dx) * 0.06}px) rotate(${baseDeg + dx / 40}deg)`;
});
function endDrag() {
  if (!dragging) return; dragging = false;
  if (Math.abs(dx) > 70) {
    go(dx < 0 ? -1 : 1);   // 左右拖都往后翻切到背后；飞出方向跟随拖动方向
  } else {
    topCard.style.transition = `transform .3s ${EASE}`;
    topCard.style.transform = baseT(topCard);    // 回弹到基础角度
  }
}
deck.addEventListener('pointerup', endDrag);
deck.addEventListener('pointercancel', endDrag);

// 去记录 → 相机
document.getElementById('btnGo').addEventListener('click', () => route('openCamera', 'live-template-camera.html'));

// ── 呼吸提示（第一次记录后出现，3 秒后淡出）+ 整页「上滑」回相册地图 ──
const breath = document.getElementById('breath');
function showBreath(on) {
  if (on) {
    // 重置动画：先移除再异步添加，触发 CSS 动画重播
    breath.classList.remove('show');
    void breath.offsetWidth;  // 强制 reflow
    breath.classList.add('show');
    // 3 秒后移除 show（动画结束后保持 opacity:0，避免重叠交互）
    clearTimeout(breath._hideTimer);
    breath._hideTimer = setTimeout(() => breath.classList.remove('show'), 3000);
  } else {
    clearTimeout(breath._hideTimer);
    breath.classList.remove('show');
  }
}
let recorded = _param('recorded') === '1';

// 整个页面上滑（记录后生效）→ 相册地图；要求垂直上滑为主，避免与左右切卡冲突
const shell = document.querySelector('.phone-shell');
let gx = 0, gy = 0, gDown = false, gTarget = null;
shell.addEventListener('pointerdown', e => { gx = e.clientX; gy = e.clientY; gDown = true; gTarget = e.target; }, true);
shell.addEventListener('pointerup', e => {
  if (!gDown) return; gDown = false;
  if (!recorded) return;
  // 起手落在「去记录」按钮上 → 视为点击，不触发整页上滑（避免热区重叠误跳相册地图）
  if (gTarget && gTarget.closest && gTarget.closest('#btnGo')) return;
  const dyUp = gy - e.clientY;                 // 上滑为正
  const dxAbs = Math.abs(e.clientX - gx);
  if (dyUp > 80 && dyUp > dxAbs * 1.5) route('goAlbum', 'album-map.html');
}, true);
breath.addEventListener('click', () => route('goAlbum', 'album-map.html')); // 点呼吸灯也可

document.getElementById('demoToggle').addEventListener('click', () => { recorded = !recorded; showBreath(recorded); });
showBreath(recorded);

render();

// 启动后异步拉真实任务（不阻塞首屏）
loadTasks();
</script>
</body>
</html>
